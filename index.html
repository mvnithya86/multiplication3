<!DOCTYPE html>
<html>
<head>
<title>Multiplication Quiz</title>

<style>
body {
  font-family: Arial;
  background: #d6f0ff;
  text-align: center;
}

.quiz-box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 65%;
  margin: auto;
  margin-top: 50px;
}

button {
  background: #fff5b1;
  border: none;
  padding: 12px;
  margin: 8px;
  width: 85%;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
}

.correct { background: lightgreen; }
.wrong { background: #ffb3b3; }

#result {
  display: none;
  font-size: 24px;
}
</style>

</head>

<body>

<div class="quiz-box">
<h2>✖️ Multiplication Quiz (3-digit × 1-digit)</h2>
<p id="question"></p>
<div id="options"></div>
</div>

<div id="result"></div>

<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>
<audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

<script>

let questions = [
{q:"123 × 4 = ?",a:492},
{q:"245 × 3 = ?",a:735},
{q:"312 × 2 = ?",a:624},
{q:"456 × 5 = ?",a:2280},
{q:"678 × 4 = ?",a:2712},
{q:"789 × 3 = ?",a:2367},
{q:"234 × 6 = ?",a:1404},
{q:"567 × 2 = ?",a:1134},
{q:"345 × 7 = ?",a:2415},
{q:"912 × 3 = ?",a:2736},

{q:"678 × 5 = ?",a:3390},
{q:"432 × 4 = ?",a:1728},
{q:"876 × 2 = ?",a:1752},
{q:"543 × 3 = ?",a:1629},
{q:"321 × 6 = ?",a:1926},
{q:"654 × 4 = ?",a:2616},
{q:"789 × 2 = ?",a:1578},
{q:"567 × 3 = ?",a:1701},
{q:"345 × 8 = ?",a:2760},
{q:"234 × 7 = ?",a:1638}
];

let current = 0;
let score = 0;

function generateOptions(correct){
  let options = new Set();
  options.add(correct);

  while(options.size < 4){
    let rand = correct + Math.floor(Math.random()*200 - 100);
    if(rand > 0) options.add(rand);
  }

  return [...options].sort(()=>Math.random()-0.5);
}

function loadQuestion(){
  if(current >= questions.length){
    showResult();
    return;
  }

  let q = questions[current];
  document.getElementById("question").innerText =
    (current+1) + ". " + q.q;

  let opts = generateOptions(q.a);

  let html = "";
  opts.forEach(opt=>{
    html += `<button onclick="checkAnswer(this,${q.a})">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = html;
}

function checkAnswer(btn, correct){
  let buttons = document.querySelectorAll("button");
  buttons.forEach(b=>b.disabled=true);

  if(Number(btn.innerText) === correct){
    btn.classList.add("correct");
    document.getElementById("correctSound").play();
    score++;
  } else {
    btn.classList.add("wrong");
    document.getElementById("wrongSound").play();
  }

  setTimeout(()=>{
    current++;
    loadQuestion();
  },1200);
}

function showResult(){
  document.querySelector(".quiz-box").style.display="none";
  let res = document.getElementById("result");
  res.style.display="block";

  let msg = score>=16 ? "🌟 Excellent!" :
            score>=10 ? "👏 Great Job!" :
            score>=5 ? "👍 Good!" :
            "💪 Keep Practicing!";

  res.innerHTML = `
  ${msg} <br><br>
  Your Score: <b>${score} / ${questions.length}</b>
  `;
}

loadQuestion();

</script>

</body>
</html>
